name: Build static site and update public

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    name: Build and update public
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]

      - name: Run site build
        run: |
          python -m linkbiosite.cli build -o public

      - name: Commit and push `public/` if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public || true
          if git diff --cached --quiet; then
            echo "No changes to public/"
          else
            git commit -m "chore: update public from CI [skip ci]"
            git push origin HEAD:main
          fi
