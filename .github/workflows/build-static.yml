name: Build static site and update public

permissions:
  contents: write

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    name: Build and push public/
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run site build
        run: |
          python -m linkbiosite.cli build -o public

      - name: Commit and push `public/` if changed
        env:
          REPO_PAT: ${{ secrets.REPO_PAT }}
        run: |
          git config user.name "rafnixg"
          git config user.email "rafnixg@gmail.com"
          git add public || true
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to public/"
          else
            git commit -m "[BOT] chore: update public from CI [skip ci]"
            git push https://x-access-token:${REPO_PAT}@github.com/${{ github.repository }}.git HEAD:main
          fi
